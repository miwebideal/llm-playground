<!-- src/app/features/sidebar/sidebar-parameters/sidebar-parameters.component.html -->

<div class="flex flex-col gap-3">
    <div class="flex items-center justify-between">
        <label class="flex items-center gap-3 cursor-pointer group">
            <span class="label-base group-hover:text-primary transition-colors">Parámetros</span>
            <app-toggle [checked]="session().useParams" (checkedChange)="update('useParams', $event)"></app-toggle>
        </label>
        <button (click)="resetSettings()"
            class="px-2.5 py-1 rounded-full border border-border-strong text-xs font-medium text-text-muted hover:text-primary hover:border-primary/50 hover:bg-primary/5 transition-all flex items-center gap-1 shadow-sm cursor-pointer">
            <svg lucideRotateCcw class="w-3 h-3"></svg> Reset
        </button>
    </div>

    @if (session().useParams) {
    <div class="flex flex-col gap-4 animate-fade-in pt-1">
        <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1.5">
                <label class="label-base">Temp</label>
                <input type="number" step="0.1" min="0" max="2" [value]="session().temperature"
                    (input)="update('temperature', +$any($event).target.value)"
                    class="input-base text-center text-xs! ">
            </div>
            <div class="space-y-1.5">
                <label class="label-base">Max Tokens</label>
                <input type="number" [value]="session().maxTokens"
                    (input)="update('maxTokens', +$any($event).target.value)" class="input-base text-center text-xs! ">
            </div>
        </div>
        <div class="space-y-1.5">
            <label class="label-base">System Prompt</label>
            <textarea [value]="session().systemPrompt" (input)="update('systemPrompt', $any($event).target.value)"
                class="input-base resize-y min-h-20 max-h-[50vh]"></textarea>
        </div>
    </div>
    }
</div>
