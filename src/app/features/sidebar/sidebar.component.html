<!-- src/app/features/sidebar/sidebar.component.html -->

<aside
    class="h-full bg-surface border-r border-border-base flex flex-col transition-all duration-300 ease-in-out shadow-2xl lg:shadow-none fixed lg:relative pb-20 md:pb-0"
    [class.w-80]="!isCollapsedDesktop()" [class.lg:w-14]="isCollapsedDesktop()"
    [class.-translate-x-full]="!isOpenMobile()" [class.translate-x-0]="isOpenMobile()" [class.lg:translate-x-0]="true">

    <!-- ESTADO COLAPSADO (DESKTOP) -->
    @if (isCollapsedDesktop()) {
    <div class="hidden lg:flex flex-col items-center py-4 h-full">
        <button (click)="toggleDesktop()"
            class="p-2 rounded-xl hover:bg-surface-hover text-text-muted hover:text-primary transition-colors cursor-pointer"
            title="Expandir configuración">
            <svg lucideSettings class="w-5 h-5"></svg>
        </button>
        <div class="mt-auto">
            <button (click)="toggleDesktop()"
                class="p-1.5 rounded-lg hover:bg-surface-hover text-text-muted transition-colors cursor-pointer">
                <svg lucideChevronRight class="w-4 h-4"></svg>
            </button>
        </div>
    </div>
    }

    <!-- ESTADO EXPANDIDO -->
    @if (!isCollapsedDesktop()) {
    <div class="flex flex-col h-full w-80 animate-fade-in">

        <!-- HEADER MOBILE -->
        <div class="flex items-center justify-between p-4 lg:hidden border-b border-border-base shrink-0">
            <span class="font-semibold text-text-main">Configuración</span>
            <button (click)="closeMobile.emit()"
                class="p-1.5 rounded-lg hover:bg-surface-hover text-text-muted transition-colors">
                <svg lucideX class="w-5 h-5"></svg>
            </button>
        </div>

        <!-- HEADER DESKTOP -->
        <div class="hidden lg:flex items-center justify-between p-3 border-b border-border-base shrink-0 ">
            <span class="font-semibold text-sm text-text-main flex items-center gap-2">
                <svg lucideSettings class="w-4 h-4 text-primary"></svg> Configuración
            </span>
            <button (click)="toggleDesktop()"
                class="p-1.5 rounded-lg hover:bg-surface-hover text-text-muted transition-colors cursor-pointer"
                title="Colapsar panel">
                <svg lucideChevronLeft class="w-4 h-4"></svg>
            </button>
        </div>

        <!-- MODO COMPARACIÓN Y TABS -->
        <div class="px-4 py-4 border-b border-border-base bg-surface-alt/30 shrink-0 flex flex-col gap-3 z-10">
            <label class="flex items-center justify-between cursor-pointer group">
                <span class="text-sm font-bold text-primary group-hover:text-primary-hover transition-colors">Modo
                    Comparación</span>
                <app-toggle [checked]="globalConfig().isCompareMode"
                    (checkedChange)="updateGlobal('isCompareMode', $event)"></app-toggle>
            </label>

            <div class="grid transition-all duration-300 ease-in-out"
                [class]="globalConfig().isCompareMode ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'">
                <div class="overflow-hidden min-h-0">
                    <div
                        class="flex p-1 bg-black/5 dark:bg-white/5 rounded-lg border border-black/5 dark:border-white/5">
                        @for (session of sessions(); track session.id) {
                        <button (click)="activeSessionId.set(session.id)"
                            [class]="activeSessionId() === session.id ? 'bg-surface shadow-sm text-text-main font-semibold' : 'text-text-muted hover:text-text-main'"
                            class="flex-1 py-1.5 text-xs rounded-md transition-all cursor-pointer">{{ session.name
                            }}</button>
                        }
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTENEDOR SCROLL -->
        <div class="p-4 flex-1 overflow-y-auto overflow-x-hidden flex flex-col gap-5">

            <!-- CONEXIÓN Y MODELO -->
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">API URL</label>
                    <input type="text" [value]="activeSession().apiUrl"
                        (input)="updateSession('apiUrl', $any($event).target.value)"
                        class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all"
                        placeholder="https://api...">
                    <div class="flex flex-wrap gap-1.5 mt-2">
                        @for (preset of presetKeys; track preset ) {
                        <button (click)="setPreset(preset)"
                            class="px-2 py-1 text-[10px] md:text-xs rounded-md bg-surface-alt hover:bg-primary hover:text-text-inverse border border-border-base text-text-main transition-colors">{{
                            preset }}</button>
                        }
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">API Token</label>
                    <div class="relative">
                        <input type="text" [value]="activeSession().apiToken"
                            (input)="updateSession('apiToken', $any($event).target.value)"
                            class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all pr-10"
                            [style.-webkit-text-security]="showToken() ? 'none' : 'disc'" placeholder="sk-...">
                        <button (click)="showToken.set(!showToken())"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-main">
                            @if (showToken()) { <svg lucideEyeOff class="w-4 h-4"></svg> } @else { <svg lucideEye
                                class="w-4 h-4"></svg> }
                        </button>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">Proveedor</label>
                    <select [value]="activeSession().provider" (change)="onProviderSelect($event)"
                        class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all cursor-pointer">
                        @for (group of modelGroups; track group) { <option [value]="group">{{ group }}</option> }
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">Modelo</label>
                    <select [value]="activeSession().model" (change)="onModelSelect($event)"
                        class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all cursor-pointer">
                        @for (model of currentModels(); track model) { <option [value]="model">{{ model }}</option> }
                    </select>
                    <input type="text" [value]="activeSession().model"
                        (input)="updateSession('model', $any($event).target.value)"
                        class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all mt-2"
                        placeholder="Ruta del modelo manual...">
                </div>
            </div>

            <!-- PARÁMETROS GLOBALES -->
            <div class="pt-4 border-t border-border-base flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <span
                            class="text-xs font-semibold text-text-muted uppercase tracking-wider group-hover:text-primary transition-colors">Parámetros</span>
                        <app-toggle [checked]="globalConfig().useParams"
                            (checkedChange)="updateGlobal('useParams', $event)"></app-toggle>
                    </label>
                    <button (click)="resetSettings()"
                        class="px-2.5 py-1 rounded-full border border-border-strong text-[10px] font-medium text-text-muted hover:text-primary hover:border-primary/50 hover:bg-primary/5 transition-all flex items-center gap-1 shadow-sm">
                        <svg lucideRotateCcw class="w-3 h-3"></svg> Reset
                    </button>
                </div>

                @if (globalConfig().useParams) {
                <div class="flex flex-col gap-4 animate-fade-in pt-1">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">Temp</label>
                            <input type="number" step="0.1" min="0" max="2" [value]="globalConfig().temperature"
                                (input)="updateGlobal('temperature', +$any($event).target.value)"
                                class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all text-center">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">Max
                                Tokens</label>
                            <input type="number" [value]="globalConfig().maxTokens"
                                (input)="updateGlobal('maxTokens', +$any($event).target.value)"
                                class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all text-center">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">System
                            Prompt</label>
                        <textarea [value]="globalConfig().systemPrompt"
                            (input)="updateGlobal('systemPrompt', $any($event).target.value)"
                            class="w-full px-3 py-2 bg-surface-alt border border-border-base rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent text-text-main transition-all resize-y min-h-20 max-h-[50vh]"></textarea>
                    </div>
                </div>
                }
            </div>

            <!-- OPCIONES DE CHAT -->
            <div class="pt-4 border-t border-border-base flex flex-col gap-3">
                <span class="text-xs font-semibold text-text-muted uppercase tracking-wider">Opciones de Chat</span>
                <div class="flex flex-col gap-2">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm text-text-main group-hover:text-primary transition-colors">Incluir
                            Historial</span>
                        <app-toggle [checked]="globalConfig().includeHistory"
                            (checkedChange)="updateGlobal('includeHistory', $event)"></app-toggle>
                    </label>
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm text-text-main group-hover:text-primary transition-colors">Modo
                            Stream</span>
                        <app-toggle [checked]="globalConfig().streamMode"
                            (checkedChange)="updateGlobal('streamMode', $event)"></app-toggle>
                    </label>
                </div>
            </div>

            <!-- CRÉDITOS -->
            <div class="text-xs pt-4 border-t border-border-base text-text-muted leading-relaxed mt-auto">
                <p>Un proyecto de <a href="https://miwebideal.com.ar" target="_blank" rel="noopener noreferrer"
                        class="text-primary hover:text-primary-hover hover:underline font-medium transition-colors">MiWebIdeal</a>
                </p>
                <a href="https://github.com/miwebideal/llm-playground" target="_blank" rel="noopener noreferrer"
                    class="mt-4 inline-flex items-center text-text-muted hover:text-text-main transition-colors font-medium">Link
                    del repo</a>
            </div>

        </div>
    </div>
    }
</aside>
