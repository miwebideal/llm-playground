<!-- src/app/components/header/header.component.html -->

<header
    class="flex lg:pl-4 lg:pr-12 items-center justify-between px-4 py-3 bg-surface border-b border-border-base shrink-0 transition-colors relative z-50">

    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center shadow-sm">
            <svg lucideZap class="w-5 h-5 text-text-inverse"></svg>
        </div>
        <div>
            <h1 class="font-bold text-lg leading-tight text-text-main">LLM Playground</h1>
            <p class="text-xs text-text-muted">AI Model Tester</p>
        </div>
    </div>

    <div class="flex items-center gap-2">

        <!-- Theme toggle -->
        <button (click)="theme.toggle()" class="btn-icon flex items-center justify-center w-8 h-8" title="Alternar tema"
            aria-label="Alternar tema">
            @if (theme.isDark()) {
            <svg lucideSun class="w-4 h-4"></svg>
            } @else {
            <svg lucideMoon class="w-4 h-4"></svg>
            }
        </button>

        <!-- Exportar Dropdown -->
        <div class="relative">

            @if (isExportMenuOpen()) {
            <div class="fixed inset-0 z-40" (click)="closeExportMenu()"></div>
            }

            <!-- Botón Principal -->
            <button (click)="toggleExportMenu()"
                class="relative z-50 flex items-center gap-1.5 h-8 px-3 rounded-lg bg-primary text-text-inverse hover:bg-primary-hover transition-colors shadow-sm cursor-pointer"
                title="Opciones de exportación">
                <svg lucideDownload class="w-4 h-4"></svg>
                <span class="hidden sm:inline text-xs font-medium">Exportar</span>
                <svg lucideChevronDown class="w-3 h-3 opacity-70 transition-transform duration-200"
                    [class.rotate-180]="isExportMenuOpen()"></svg>
            </button>

            <!-- Menú Desplegable -->
            <div class="absolute right-0 top-full mt-2 w-48 bg-surface border border-border-base rounded-xl shadow-xl z-50 overflow-hidden transition-all duration-200 origin-top-right"
                [class]="isExportMenuOpen() ? 'scale-100 opacity-100' : 'scale-95 opacity-0 pointer-events-none'">

                <button (click)="onCopyChat()"
                    class="w-full flex items-center gap-2.5 px-3 py-2.5 text-xs font-medium text-text-main hover:bg-surface-hover transition-colors cursor-pointer text-left">
                    <svg lucideCopy class="w-4 h-4 text-text-muted"></svg>
                    Copiar al portapapeles
                </button>

                <div class="h-px bg-border-base w-full"></div>

                <button (click)="onExportMd()"
                    class="w-full flex items-center gap-2.5 px-3 py-2.5 text-xs font-medium text-text-main hover:bg-surface-hover transition-colors cursor-pointer text-left">
                    <svg lucideFileText class="w-4 h-4 text-text-muted"></svg>
                    Exportar Markdown (.md)
                </button>

                <button (click)="onExportJson()"
                    class="w-full flex items-center gap-2.5 px-3 py-2.5 text-xs font-medium text-text-main hover:bg-surface-hover transition-colors cursor-pointer text-left">
                    <svg lucideFileBraces class="w-4 h-4 text-text-muted"></svg>
                    Exportar JSON (.json)
                </button>
            </div>
        </div>

        <!-- Menu mobile -->
        <button (click)="toggleConfig.emit()" class="btn-icon flex items-center justify-center w-8 h-8"
            aria-label="Abrir menú">
            <svg lucideMenu class="w-4 h-4"></svg>
        </button>

    </div>

</header>
