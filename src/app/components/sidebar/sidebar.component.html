<!-- src/app/components/sidebar/sidebar.component.html -->

<aside
    class="h-full w-full bg-surface border-r border-border-base flex flex-col transition-colors duration-200 shadow-2xl lg:shadow-none">

    <div class="flex items-center justify-between p-4 lg:hidden border-b border-border-base shrink-0">
        <span class="font-semibold text-text-main">Configuración</span>
        <button (click)="closeSidebar.emit()" class="btn-icon" title="Cerrar" aria-label="Cerrar menú">
            <svg lucideX class="w-5 h-5"></svg>
        </button>
    </div>

    <div class="p-4 space-y-5 overflow-y-auto flex-1">

        <!-- Toggle Comparación -->
        <label
            class="flex items-center justify-between cursor-pointer group py-2 px-3 bg-primary-bg rounded-lg border border-primary/20">
            <span class="text-sm font-semibold text-primary-text">Modo Comparación</span>
            <app-toggle [checked]="config().isCompareMode" (checkedChange)="updateIsCompareMode($event)"></app-toggle>
        </label>

        <!-- Tabs de Configuración -->
        @if (config().isCompareMode) {
        <div class="flex p-1 bg-surface-alt rounded-lg">
            <button (click)="configTab.set('a')"
                [class]="configTab() === 'a' ? 'bg-surface shadow-sm text-text-main' : 'text-text-muted hover:text-text-main'"
                class="flex-1 py-1.5 text-xs font-medium rounded-md transition-all">Modelo A</button>
            <button (click)="configTab.set('b')"
                [class]="configTab() === 'b' ? 'bg-surface shadow-sm text-text-main' : 'text-text-muted hover:text-text-main'"
                class="flex-1 py-1.5 text-xs font-medium rounded-md transition-all">Modelo B</button>
        </div>
        }

        <!-- Bloque de Inputs Dinámico -->
        <div class="space-y-4">
            <div class="space-y-1.5">
                <label class="label-base">API URL {{ config().isCompareMode ? (configTab() | uppercase) : '' }}</label>
                <input type="text" [value]="configTab() === 'a' ? config().apiUrl : config().apiUrlB"
                    (input)="configTab() === 'a' ? updateApiUrl($any($event).target.value) : updateApiUrlB($any($event).target.value)"
                    placeholder="https://api.ejemplo.com/v1/chat/completions" class="input-base" autocomplete="off"
                    spellcheck="false">
                <div class="flex flex-wrap gap-1.5 mt-2">
                    @for (preset of presetKeys; track preset ) {
                    <button (click)="setPreset(preset)"
                        class="px-2 py-1 text-xs rounded-md bg-surface-alt hover:bg-primary hover:text-text-inverse transition-colors border border-border-base text-text-main hover:cursor-pointer">
                        {{ preset }}
                    </button>
                    }
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="label-base">API Token {{ config().isCompareMode ? (configTab() | uppercase) : ''
                    }}</label>
                <div class="relative">
                    <input type="text" [value]="configTab() === 'a' ? config().apiToken : config().apiTokenB"
                        (input)="configTab() === 'a' ? updateApiToken($any($event).target.value) : updateApiTokenB($any($event).target.value)"
                        placeholder="sk-..." class="input-base pr-10" [class.text-security-disc]="!showToken()"
                        autocomplete="off" spellcheck="false">
                    <button (click)="showToken.set(!showToken())"
                        class="absolute right-2 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-main hover:cursor-pointer">
                        @if (showToken()) { <svg lucideEyeOff class="w-4 h-4"></svg> } @else { <svg lucideEye
                            class="w-4 h-4"></svg> }
                    </button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="label-base">Modelo {{ config().isCompareMode ? (configTab() | uppercase) : '' }}</label>
                <input type="text" [value]="configTab() === 'a' ? config().model : config().modelB"
                    (input)="configTab() === 'a' ? updateModel($any($event).target.value) : updateModelB($any($event).target.value)"
                    placeholder="meta-llama/Llama-3.3-70B-Instruct" class="input-base input-model" autocomplete="off"
                    spellcheck="false">
            </div>

        </div>

        <!-- Parámetros -->
        <div class="pt-4 border-t border-border-base">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-text-muted uppercase tracking-wider">Parámetros</span>
                <button (click)="resetSettings()"
                    class="text-[10px] text-text-muted hover:cursor-pointer hover:text-primary transition-colors flex items-center gap-1"
                    title="Restablecer valores por defecto">
                    <svg lucideRotateCcw class="w-3 h-3"></svg> Reset
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1.5">
                    <label for="input-temp" class="label-base">Temp</label>
                    <input id="input-temp" type="number" step="0.1" min="0" max="2" [value]="config().temperature"
                        (input)="updateTemperature(+$any($event).target.value)" class="input-base text-center">
                </div>
                <div class="space-y-1.5">
                    <label for="input-tokens" class="label-base">Max Tokens</label>
                    <input id="input-tokens" type="number" [value]="config().maxTokens"
                        (input)="updateMaxTokens(+$any($event).target.value)" class="input-base text-center">
                </div>
            </div>
        </div>

        <!-- System Prompt -->
        <div class="space-y-1.5">
            <label for="input-prompt" class="label-base">System Prompt</label>
            <textarea id="input-prompt" [value]="config().systemPrompt"
                (input)="updateSystemPrompt($any($event).target.value)"
                class="input-base resize-y min-h-20 max-h-[50vh]"></textarea>
        </div>

        <div class="space-y-3 pt-2 border-t border-border-base">

            <!-- Toggle Historial -->
            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-2">
                    <svg lucideHistory class="w-4 h-4 text-text-muted group-hover:text-primary transition-colors"></svg>
                    <span class="text-sm font-medium text-text-main">Incluir Historial</span>
                </div>
                <app-toggle [checked]="config().includeHistory"
                    (checkedChange)="updateIncludeHistory($event)"></app-toggle>
            </label>

            <!-- Toggle Stream -->
            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-2">
                    <svg lucideActivity
                        class="w-4 h-4 text-text-muted group-hover:text-success transition-colors"></svg>
                    <span class="text-sm font-medium text-text-main">Modo Stream</span>
                </div>
                <app-toggle [checked]="config().streamMode" (checkedChange)="updateStreamMode($event)"></app-toggle>
            </label>

        </div>

        <!-- Créditos -->
        <div class="text-xs pt-6 text-text-muted leading-relaxed">
            <p>Un proyecto de <a href="https://miwebideal.com.ar" target="_blank"
                    class="text-primary hover:text-primary-hover hover:underline font-medium transition-colors">MiWebIdeal</a>
            </p>
            <a href="https://github.com/miwebideal/llm-playground" target="_blank"
                class="mt-4 inline-flex items-center text-text-muted hover:text-text-main transition-colors font-medium">
                Link del repo
            </a>
        </div>

    </div>
</aside>
