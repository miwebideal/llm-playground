<!-- src/app/components/sidebar/sidebar.component.html -->

<aside
    class="h-full w-full bg-surface border-r border-border-base flex flex-col transition-colors duration-200 shadow-2xl lg:shadow-none">

    <!-- HEADER MOBILE -->
    <div class="flex items-center justify-between p-4 lg:hidden border-b border-border-base shrink-0">
        <span class="font-semibold text-text-main">Configuración</span>
        <button (click)="closeSidebar.emit()" class="btn-icon" title="Cerrar" aria-label="Cerrar menú">
            <svg lucideX class="w-5 h-5"></svg>
        </button>
    </div>

    <!-- MODO COMPARACIÓN -->
    <div class="px-4 py-4 border-b border-border-base bg-surface-alt/30 shrink-0 flex flex-col gap-3 z-10">
        <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-sm font-bold text-primary group-hover:text-primary-hover transition-colors">Modo
                Comparación</span>
            <app-toggle [checked]="config().isCompareMode" (checkedChange)="updateIsCompareMode($event)"></app-toggle>
        </label>

        <!-- TABS -->
        <div class="grid transition-all duration-300 ease-in-out"
            [class]="config().isCompareMode ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'">
            <div class="overflow-hidden min-h-0">
                <div class="flex p-1 bg-black/5 dark:bg-white/5 rounded-lg border border-black/5 dark:border-white/5">
                    <button (click)="configTab.set('a')"
                        [class]="configTab() === 'a' ? 'bg-surface shadow-sm text-text-main font-semibold' : 'text-text-muted hover:text-text-main'"
                        class="flex-1 py-1.5 text-xs rounded-md transition-all cursor-pointer">Modelo A</button>
                    <button (click)="configTab.set('b')"
                        [class]="configTab() === 'b' ? 'bg-surface shadow-sm text-text-main font-semibold' : 'text-text-muted hover:text-text-main'"
                        class="flex-1 py-1.5 text-xs rounded-md transition-all cursor-pointer">Modelo B</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENEDOR -->
    <div class="p-4 flex-1 overflow-y-auto overflow-x-hidden flex flex-col gap-5">

        <!-- CONEXIÓN Y MODELO -->
        <div class="space-y-4">
            <div class="space-y-1.5">
                <label class="label-base">API URL {{ config().isCompareMode ? (configTab() | uppercase) : '' }}</label>
                <input type="text" [value]="configTab() === 'a' ? config().apiUrl : config().apiUrlB"
                    (input)="configTab() === 'a' ? updateApiUrl($any($event).target.value) : updateApiUrlB($any($event).target.value)"
                    placeholder="https://api.ejemplo.com/v1/chat/completions" class="input-base" autocomplete="off"
                    spellcheck="false">
                <div class="flex flex-wrap gap-1.5 mt-2">
                    @for (preset of presetKeys; track preset ) {
                    <button (click)="setPreset(preset)"
                        class="px-2 py-1 text-xs rounded-md bg-surface-alt hover:bg-primary hover:text-text-inverse transition-colors border border-border-base text-text-main hover:cursor-pointer">
                        {{ preset }}
                    </button>
                    }
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="label-base">API Token {{ config().isCompareMode ? (configTab() | uppercase) : ''
                    }}</label>
                <div class="relative">
                    <input type="text" [value]="configTab() === 'a' ? config().apiToken : config().apiTokenB"
                        (input)="configTab() === 'a' ? updateApiToken($any($event).target.value) : updateApiTokenB($any($event).target.value)"
                        placeholder="sk-..." class="input-base pr-10" [class.text-security-disc]="!showToken()"
                        autocomplete="off" spellcheck="false">
                    <button (click)="showToken.set(!showToken())"
                        class="absolute right-2 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-main hover:cursor-pointer">
                        @if (showToken()) { <svg lucideEyeOff class="w-4 h-4"></svg> } @else { <svg lucideEye
                            class="w-4 h-4"></svg> }
                    </button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="label-base">Modelo {{ config().isCompareMode ? (configTab() | uppercase) : '' }}</label>
                <select [value]="dropdownValue()" (change)="onModelSelect($event)" class="input-base cursor-pointer">
                    <option value="manual" class="font-semibold">[ Ingresar Manualmente ]</option>
                    @for (group of modelGroups; track group) {
                    <optgroup [label]="group">
                        @for (model of aiModels[group]; track model) {
                        <option [value]="model">{{ model }}</option>
                        }
                    </optgroup>
                    }
                </select>

                <!-- INPUT MANUAL -->
                <div class="grid transition-all duration-300 ease-in-out"
                    [class]="isManualMode() ? 'grid-rows-[1fr] opacity-100 mt-2' : 'grid-rows-[0fr] opacity-0 mt-0'">
                    <div class="overflow-hidden min-h-0">
                        <input type="text" [value]="configTab() === 'a' ? config().model : config().modelB"
                            (input)="configTab() === 'a' ? updateModel($any($event).target.value) : updateModelB($any($event).target.value)"
                            placeholder="Escribe la ruta del modelo..." class="input-base input-model"
                            autocomplete="off" spellcheck="false">
                    </div>
                </div>
            </div>
        </div>

        <!-- PARÁMETROS Y PROMPT -->
        <div class="pt-4 border-t border-border-base flex flex-col gap-3">

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <span
                        class="text-xs font-semibold text-text-muted uppercase tracking-wider group-hover:text-primary transition-colors">Parámetros</span>
                    <app-toggle [checked]="config().useParams" (checkedChange)="updateUseParams($event)"></app-toggle>
                </label>
                <button (click)="resetSettings()"
                    class="px-2.5 py-1 rounded-full border border-border-strong text-[10px] font-medium text-text-muted hover:text-primary hover:border-primary/50 hover:bg-primary/5 transition-all flex items-center gap-1 cursor-pointer shadow-sm"
                    title="Restablecer valores por defecto">
                    <svg lucideRotateCcw class="w-3 h-3"></svg> Reset
                </button>
            </div>

            <div class="grid transition-all duration-300 ease-in-out"
                [class]="(config().useParams) ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'">
                <div class="overflow-hidden min-h-0 flex flex-col gap-4">

                    <div class="grid grid-cols-2 gap-3 pt-1">
                        <div class="space-y-1.5">
                            <label for="input-temp" class="label-base">Temp</label>
                            <input id="input-temp" type="number" step="0.1" min="0" max="2"
                                [value]="config().temperature" (input)="updateTemperature(+$any($event).target.value)"
                                class="input-base text-center">
                        </div>
                        <div class="space-y-1.5">
                            <label for="input-tokens" class="label-base">Max Tokens</label>
                            <input id="input-tokens" type="number" [value]="config().maxTokens"
                                (input)="updateMaxTokens(+$any($event).target.value)" class="input-base text-center">
                        </div>
                    </div>

                    <div class="space-y-1.5 pb-1">
                        <label for="input-prompt" class="label-base">System Prompt</label>
                        <textarea id="input-prompt" [value]="config().systemPrompt"
                            (input)="updateSystemPrompt($any($event).target.value)"
                            class="input-base resize-y min-h-20 max-h-[50vh]"></textarea>
                    </div>

                </div>
            </div>
        </div>

        <!-- CRÉDITOS -->
        <div class="text-xs pt-4 border-t border-border-base text-text-muted leading-relaxed mt-auto">
            <p>Un proyecto de
                <a href="https://miwebideal.com.ar" target="_blank" rel="noopener noreferrer"
                    title="Visitar el sitio web oficial de MiWebIdeal"
                    class="text-primary hover:text-primary-hover hover:underline font-medium transition-colors">
                    MiWebIdeal
                </a>
            </p>
            <a href="https://github.com/miwebideal/llm-playground" target="_blank" rel="noopener noreferrer"
                title="Ver el código fuente de LLM Playground en GitHub"
                class="mt-4 inline-flex items-center text-text-muted hover:text-text-main transition-colors font-medium">
                Link del repo
            </a>
        </div>

    </div>
</aside>
