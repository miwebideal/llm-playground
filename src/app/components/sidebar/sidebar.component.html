<!-- src/app/components/sidebar/sidebar.component.html -->

<aside
    class="h-full w-full bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col transition-colors duration-200 shadow-2xl lg:shadow-none">

    <div class="flex items-center justify-between p-4 lg:hidden border-b border-gray-200 dark:border-gray-800 shrink-0">
        <span class="font-semibold text-gray-700 dark:text-gray-200">Configuración</span>
        <button (click)="closeSidebar.emit()" class="btn-icon" title="Cerrar">
            <svg lucideX class="w-5 h-5"></svg>
        </button>
    </div>

    <div class="p-4 space-y-5 overflow-y-auto flex-1">
        <div class="space-y-1.5">
            <label class="label-base">API URL</label>
            <input type="text" [value]="config().apiUrl" (input)="updateApiUrl($any($event).target.value)"
                placeholder="https://api.ejemplo.com/v1/chat/completions" class="input-base" autocomplete="off"
                spellcheck="false">
            <div class="flex flex-wrap gap-1.5 mt-2">
                @for (preset of ['deepinfra', 'fireworks', 'gemini', 'openrouter', 'groq', 'together']; track preset) {
                <button (click)="setPreset(preset)"
                    class="px-2 py-1 text-xs rounded-md bg-gray-100 dark:bg-gray-800 hover:bg-violet-600 hover:text-white dark:hover:bg-violet-600 transition-colors border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300">
                    {{ preset }}
                </button>
                }
            </div>
        </div>

        <div class="space-y-1.5">
            <label class="label-base">API Token</label>
            <div class="relative">
                <input [type]="showToken() ? 'text' : 'password'" [value]="config().apiToken"
                    (input)="updateApiToken($any($event).target.value)" placeholder="sk-..." class="input-base pr-10"
                    autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false"
                    data-lpignore="true" data-form-type="other" (focus)="onTokenFocus($event)">
                <button (click)="showToken.set(!showToken())"
                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    @if (showToken()) {
                    <svg lucideEyeOff class="w-4 h-4"></svg>
                    } @else {
                    <svg lucideEye class="w-4 h-4"></svg>
                    }
                </button>
            </div>
        </div>

        <div class="space-y-1.5">
            <label class="label-base">Modelo</label>
            <input type="text" [value]="config().model" (input)="updateModel($any($event).target.value)"
                placeholder="meta-llama/Llama-3.3-70B-Instruct" class="input-base" autocomplete="off"
                spellcheck="false">
        </div>

        <div class="pt-4 border-t border-gray-200 dark:border-gray-800">
            <div class="flex items-center justify-between mb-3">
                <span
                    class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Parámetros</span>
                <button (click)="resetSettings()"
                    class="text-[10px] text-gray-400 hover:text-violet-500 transition-colors flex items-center gap-1"
                    title="Restablecer valores por defecto">
                    <svg lucideRotateCcw class="w-3 h-3"></svg>
                    Reset
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1.5">
                    <label class="label-base">Temp</label>
                    <input type="number" step="0.1" min="0" max="2" [value]="config().temperature"
                        (input)="updateTemperature(+$any($event).target.value)" class="input-base text-center">
                </div>
                <div class="space-y-1.5">
                    <label class="label-base">Max Tokens</label>
                    <input type="number" [value]="config().maxTokens"
                        (input)="updateMaxTokens(+$any($event).target.value)" class="input-base text-center">
                </div>
            </div>
        </div>

        <div class="space-y-1.5">
            <label class="label-base">System Prompt</label>
            <textarea [value]="config().systemPrompt" (input)="updateSystemPrompt($any($event).target.value)" rows="3"
                class="input-base resize-none"></textarea>
        </div>

        <div class="space-y-3 pt-2 border-t border-gray-200 dark:border-gray-800">
            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-2">
                    <svg lucideHistory
                        class="w-4 h-4 text-gray-500 group-hover:text-violet-500 dark:group-hover:text-violet-400 transition-colors"></svg>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Incluir Historial</span>
                </div>
                <div class="relative">
                    <input type="checkbox" [checked]="config().includeHistory"
                        (change)="updateIncludeHistory($any($event).target.checked)" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-300 dark:bg-gray-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-violet-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-violet-600">
                    </div>
                </div>
            </label>

            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-2">
                    <svg lucideActivity
                        class="w-4 h-4 text-gray-500 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors"></svg>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Modo Stream</span>
                </div>
                <div class="relative">
                    <input type="checkbox" [checked]="config().streamMode"
                        (change)="updateStreamMode($any($event).target.checked)" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-300 dark:bg-gray-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-emerald-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600">
                    </div>
                </div>
            </label>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-200 dark:border-gray-800">
            <div class="flex items-center gap-2 text-xs mb-4">
                <div [class]="hasConfig() ? 'bg-emerald-500' : 'bg-red-500'" class="w-2 h-2 rounded-full"></div>
                <span class="text-gray-500 dark:text-gray-400 font-medium">
                    {{ hasConfig() ? 'Configuración lista' : 'Faltan datos de API' }}
                </span>
            </div>

            <div class="text-xs pt-6 text-gray-400 dark:text-gray-500 leading-relaxed">
                <p>Un proyecto de <a href="https://miwebideal.com.ar" target="_blank"
                        class="text-violet-500 hover:text-violet-600 dark:text-violet-400 dark:hover:text-violet-300 hover:underline font-medium transition-colors">MiWebIdeal</a>
                </p>
                <p class="mt-1 opacity-75">Devolviendo un poco a la comunidad de la que tanto aprendí 🚀</p>
            </div>
        </div>

    </div>
</aside>
